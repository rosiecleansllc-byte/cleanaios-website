<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 210" role="img" aria-label="Clean AiOS Advisory">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&amp;family=Instrument+Sans:wght@400&amp;display=swap');
    </style>
  </defs>
  <!-- Top double rule -->
  <line x1="40" y1="20" x2="560" y2="20" stroke="#75d3df" stroke-width="2.2"/>
  <line x1="40" y1="29" x2="560" y2="29" stroke="#75d3df" stroke-width="1"/>
  <!-- Clean AiOS -->
  <text x="300" y="148" text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="100" font-weight="400">
    <tspan fill="#111111">Clean </tspan><tspan fill="#75d3df">AiOS</tspan>
  </text>
  <!-- ADVISORY row -->
  <line x1="40" y1="178" x2="226" y2="178" stroke="#75d3df" stroke-width="1.3"/>
  <text x="300" y="186" text-anchor="middle"
    font-family="'Instrument Sans', Arial, sans-serif"
    font-size="13" font-weight="400"
    textLength="116" lengthAdjust="spacing"
    fill="#222222">ADVISORY</text>
  <line x1="374" y1="178" x2="560" y2="178" stroke="#75d3df" stroke-width="1.3"/>
</svg>
